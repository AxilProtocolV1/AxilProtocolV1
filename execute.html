<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Axil Protocol | Execute</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Web3Modal для любых кошельков -->
    <script src="https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/web3modal@1.9.8/dist/web3modal.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@walletconnect/web3-provider@1.8.0/dist/umd/index.min.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            padding: 12px;
        }
        .card {
            background: white;
            border-radius: 24px;
            padding: 32px;
            max-width: 520px;
            width: 100%;
            box-shadow: 0 25px 50px rgba(0,0,0,0.25);
        }
        .btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            width: 100%;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 24px;
        }
        .btn:hover {
            background: #764ba2;
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .btn-secondary {
            background: #475569;
            margin-top: 12px;
        }
        .btn-secondary:hover {
            background: #334155;
        }
        .info {
            background: #f8fafc;
            padding: 16px;
            border-radius: 16px;
            margin: 20px 0;
            font-size: 14px;
            border: 1px solid #e2e8f0;
        }
        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
        }
        .label {
            font-weight: 600;
            color: #475569;
        }
        .value {
            color: #0f172a;
            font-family: monospace;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 4px 0 16px 0;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            font-size: 15px;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }
        .badge {
            background: #dbeafe;
            color: #1e40af;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .hash-box {
            background: #f1f5f9;
            padding: 16px;
            border-radius: 12px;
            word-break: break-all;
            margin-top: 20px;
            font-family: monospace;
            font-size: 13px;
            border: 1px solid #e2e8f0;
        }
        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid #e2e8f0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .small-text {
            color: #64748b;
            font-size: 0.85rem;
        }
        .wallet-badge {
            background: #e6f7e6;
            color: #0a5c0a;

padding: 2px 8px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            margin-left: 8px;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            max-width: 400px;
            margin: 0 auto;
            background: #1e293b;
            color: white;
            padding: 12px;
            border-radius: 60px;
            text-align: center;
            font-size: 14px;
            display: none;
            animation: slideUp 0.3s;
            z-index: 1000;
        }
        @keyframes slideUp {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="toast" id="toast"></div>

    <div class="card">
        <h2 style="margin-bottom: 4px; color: #1e293b;">Axil Protocol</h2>
        <p style="color: #475569; margin-bottom: 24px;">Execute transaction on Monad</p>
        
        <div class="info">
            <div class="info-item">
                <span class="label">Contract</span>
                <span class="value">0xb3a59e...a4552</span>
            </div>
            <div class="info-item">
                <span class="label">Network</span>
                <span class="value">Monad Testnet <span class="badge">10143</span></span>
            </div>
            <div class="info-item">
                <span class="label">Your address</span>
                <span class="value" id="userAddress">Not connected</span>
            </div>
        </div>
        
        <label>Amount (MON)</label>
        <input type="number" id="amount" value="0.1" step="0.001" min="0.001">
        
        <label>Packed intent (auto)</label>
        <input type="text" id="packedIntent" readonly>
        
        <label>Deadline</label>
        <input type="number" id="deadline" value="1800000000">
        <div class="small-text" style="margin-bottom: 16px;">Current: <span id="currentTime"></span></div>
        
        <label>Salt</label>
        <input type="number" id="salt" value="12345">
        
        <button class="btn" id="connectBtn" onclick="connectWallet()">Connect Wallet</button>
        <button class="btn btn-secondary" id="executeBtn" onclick="executeTransaction()" disabled>Execute transaction</button>
        
        <div id="loading" style="display: none; text-align: center; margin: 20px 0;">
            <div class="spinner"></div>
            <p style="margin-top: 12px; color: #475569;">Processing...</p>
        </div>
        
        <div id="result" style="display: none;" class="hash-box"></div>
    </div>

    <script>
        // Configuration
        const CONTRACT_ADDR = "0xb3a59e559b470ce9edc1ccf70b912f8a021a4552";
        const YOUR_ADDRESS = "0x8cFBB1eEaF94d5877E21D191cA95A520a8710A21";
        const RENDER_URL = "https://axilprotocolv1.onrender.com/sign";
        
        const ABI = [{
            "inputs": [
                {"name": "merchant", "type": "address"},
                {"name": "user", "type": "address"},
                {"name": "packedIntent", "type": "bytes32"},
                {"name": "deadline", "type": "uint256"},
                {"name": "salt", "type": "uint128"},
                {"name": "signature", "type": "bytes"}
            ],
            "name": "execute",
            "outputs": [],
            "stateMutability": "payable",
            "type": "function"
        }];
        
        let web3;
        let account;
        let provider;
        let toastTimeout;
        
        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.style.background = isError ? '#991b1b' : '#1e293b';

toast.innerText = msg;
            toast.style.display = 'block';
            if (toastTimeout) clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }
        
        window.onload = function() {
            updateTime();
            setInterval(updateTime, 1000);
            generateNewIntent();
        };
        
        function updateTime() {
            document.getElementById('currentTime').innerText = Math.floor(Date.now() / 1000);
        }
        
        function generateNewIntent() {
            const randomIntent = '0x' + [...Array(64)].map(() => Math.floor(Math.random() * 16).toString(16)).join('');
            document.getElementById('packedIntent').value = randomIntent;
        }
        
        async function connectWallet() {
            try {
                const providerOptions = {
                    walletconnect: {
                        package: window.WalletConnectProvider,
                        options: {
                            rpc: { 10143: "https://testnet-rpc.monad.xyz" },
                            chainId: 10143
                        }
                    }
                };
                
                const web3Modal = new window.Web3Modal({
                    cacheProvider: true,
                    providerOptions,
                    disableInjectedProvider: false
                });
                
                provider = await web3Modal.connect();
                web3 = new Web3(provider);
                
                const accounts = await web3.eth.getAccounts();
                account = accounts[0];
                
                let walletType = "MetaMask";
                if (provider.isWalletConnect) walletType = "WalletConnect";
                else if (provider.isTrust) walletType = "Trust";
                
                document.getElementById('userAddress').innerHTML = 
                    account.slice(0,6) + '...' + account.slice(-4) + 
                    '<span class="wallet-badge">' + walletType + '</span>';
                
                document.getElementById('connectBtn').disabled = true;
                document.getElementById('executeBtn').disabled = false;
                showToast('Wallet connected');
                
                generateNewIntent();
                
            } catch (err) {
                showToast('Connection failed: ' + err.message, true);
            }
        }
        
        async function executeTransaction() {
            if (!account) {
                showToast('Please connect wallet first', true);
                return;
            }
            
            const btn = document.getElementById('executeBtn');
            const loading = document.getElementById('loading');
            const result = document.getElementById('result');
            
            btn.disabled = true;
            loading.style.display = 'block';
            result.style.display = 'none';
            
            try {
                const chainId = await web3.eth.getChainId();
                if (chainId !== 10143) {
                    throw new Error('Wrong network. Switch to Monad Testnet');
                }
                
                generateNewIntent();
                
                const amount = document.getElementById('amount').value;
                const packedIntent = document.getElementById('packedIntent').value;
                const deadline = parseInt(document.getElementById('deadline').value);
                const salt = parseInt(document.getElementById('salt').value);
                
                showToast('Getting signature...');
                
                const signatureRes = await fetch(RENDER_URL, {

method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        merchant: YOUR_ADDRESS,
                        user: YOUR_ADDRESS,
                        packedIntent,
                        amount,
                        deadline,
                        salt,
                        agent: YOUR_ADDRESS
                    })
                });
                
                const signatureData = await signatureRes.json();
                if (!signatureData.success) throw new Error(signatureData.error || 'Signature failed');
                
                showToast('Confirm in wallet...');
                
                const contract = new web3.eth.Contract(ABI, CONTRACT_ADDR);
                
                const tx = await contract.methods.execute(
                    YOUR_ADDRESS,
                    YOUR_ADDRESS,
                    packedIntent,
                    deadline,
                    salt,
                    signatureData.signature
                ).send({ 
                    from: account, 
                    value: web3.utils.toWei(amount, 'ether')
                });
                
                result.innerHTML = 'Transaction sent<br>' +
                    '<a href="https://monad-testnet.socialscan.io/tx/' + tx.transactionHash + '" target="_blank">' +
                    tx.transactionHash.slice(0,30) + '...</a>';
                result.style.display = 'block';
                showToast('Transaction confirmed');
                
                generateNewIntent();
                
            } catch (err) {
                showToast(err.message, true);
            } finally {
                btn.disabled = false;
                loading.style.display = 'none';
            }
        }
    </script>
</body>
</html
