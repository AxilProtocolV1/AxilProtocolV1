<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Axil Protocol — Payment</title>
    
    <!-- Font & styling -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0B1120 0%, #1A1F2E 100%);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .card {
            max-width: 480px;
            width: 100%;
            background: #ffffff;
            border-radius: 32px;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .header {
            text-align: left;
            margin-bottom: 2rem;
        }

        .header h1 {
            color: #0B1120;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 0.25rem;
        }

        .header p {
            color: #4B5565;
            font-size: 0.95rem;
        }

        .amount-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            color: white;
            box-shadow: 0 10px 20px rgba(102,126,234,0.3);
        }

        .amount-label {
            font-size: 0.85rem;
            opacity: 0.9;
            margin-bottom: 0.25rem;
        }

        .amount-value {
            font-size: 2.5rem;
            font-weight: 700;
            line-height: 1;
        }

        .amount-value small {
            font-size: 1rem;
            font-weight: 400;
            opacity: 0.9;
            margin-left: 0.25rem;
        }

        .network-badge {
            background: rgba(255,255,255,0.2);
            padding: 0.25rem 0.75rem;
            border-radius: 60px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-block;
            margin-top: 0.5rem;
        }

        .info-grid {
            background: #F9FAFB;
            border-radius: 16px;
            padding: 1.25rem;
            margin-bottom: 2rem;
            border: 1px solid #E5E7EB;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            font-size: 0.9rem;
            border-bottom: 1px solid #E5E7EB;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            color: #6B7280;
            font-weight: 500;
        }

        .info-value {
            color: #1F2937;
            font-weight: 600;
            font-family: 'SF Mono', monospace;
        }

        .wallet-section {
            margin: 2rem 0;
        }

        .wallet-title {
            color: #1F2937;
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 1rem;
        }

        .wallet-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.75rem;
        }

        .wallet-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;

padding: 1rem;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.9rem;
            text-decoration: none;
            color: white;
            transition: all 0.2s;
            border: none;
            cursor: pointer;
            width: 100%;
        }

        .wallet-btn:active {
            transform: scale(0.97);
        }

        .wallet-btn.metamask { background: #F6851B; }
        .wallet-btn.binance { background: #F0B90B; color: #1E2026; }
        .wallet-btn.coinbase { background: #0052FF; }
        .wallet-btn.trust { background: #3375BB; }
        .wallet-btn.rainbow { background: #001A4D; }
        .wallet-btn.okx { background: #1A1A1A; }

        .payment-status {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid #E5E7EB;
        }

        .button-primary {
            width: 100%;
            background: #0B1120;
            color: white;
            border: none;
            border-radius: 60px;
            padding: 1.25rem;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .button-primary:hover {
            background: #1F2937;
        }

        .button-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .loader {
            display: none;
            text-align: center;
            margin: 1.5rem 0;
        }

        .spinner {
            width: 2rem;
            height: 2rem;
            border: 3px solid #E5E7EB;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 0.75rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .result-box {
            background: #F3F4F6;
            border-radius: 16px;
            padding: 1.25rem;
            margin-top: 1.5rem;
            word-break: break-all;
            font-family: monospace;
            font-size: 0.85rem;
        }

        .toast {
            position: fixed;
            bottom: 1.5rem;
            left: 1.5rem;
            right: 1.5rem;
            max-width: 400px;
            margin: 0 auto;
            background: #1F2937;
            color: white;
            padding: 1rem;
            border-radius: 60px;
            text-align: center;
            font-size: 0.9rem;
            display: none;
            animation: slideUp 0.3s ease;
            z-index: 1000;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .footer {
            margin-top: 2rem;
            text-align: center;
            color: #9CA3AF;
            font-size: 0.75rem;
        }

        .footer a {
            color: #667eea;
            text-decoration: none;
        }

        @media (max-width: 480px) {
            .wallet-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="toast" id="toast"></div>

    <div class="card">
        <div class="header">
            <h1>Axil Protocol</h1>
            <p>Payment layer for autonomous agents on Monad</p>
        </div>

        <div class="amount-card">
            <div class="amount-label">Payment amount</div>
            <div class="amount-value">0.1 <small>MON</small></div>
            <div class="network-badge">Monad Testnet · Chain ID 10143</div>
        </div>

        <div class="info-grid">
            <div class="info-row">
                <span class="info-label">Contract</span>
                <span class="info-value">0xb3a59e…a4552</span>

        </div>
            <div class="info-row">
                <span class="info-label">Recipient</span>
                <span class="info-value">0x8cFBB1…0A21</span>
            </div>
            <div class="info-row">
                <span class="info-label">Gas</span>
                <span class="info-value">≈ 0.001 MON</span>
            </div>
        </div>

        <div class="wallet-section">
            <div class="wallet-title">🔌 Choose wallet</div>
            <div class="wallet-grid" id="walletGrid"></div>
        </div>

        <div class="payment-status">
            <button class="button-primary" id="mainAction" onclick="handleMainAction()">
                Connect Wallet
            </button>
        </div>

        <div class="loader" id="loader">
            <div class="spinner"></div>
            <p style="color: #6B7280;">Processing transaction...</p>
        </div>

        <div id="result" class="result-box" style="display: none;"></div>

        <div class="footer">
            <a href="#" onclick="addMonadNetwork()">Add Monad to wallet</a> · 
            <a href="https://github.com/AxilProtocolV1" target="_blank">GitHub</a>
        </div>
    </div>

    <script>
        // ==================== CONFIG ====================
        const CONTRACT_ADDR = "0xb3a59e559b470ce9edc1ccf70b912f8a021a4552";
        const MERCHANT_ADDR = "0x8cFBB1eEaF94d5877E21D191cA95A520a8710A21";
        const RENDER_URL = "https://axilprotocolv1.onrender.com/sign";
        const BASE_URL = "https://axilprotocolv1.github.io/AxilProtocolV1/execute.html";

        const ABI = [{
            "inputs": [
                {"name": "merchant", "type": "address"},
                {"name": "user", "type": "address"},
                {"name": "packedIntent", "type": "bytes32"},
                {"name": "deadline", "type": "uint256"},
                {"name": "salt", "type": "uint128"},
                {"name": "signature", "type": "bytes"}
            ],
            "name": "execute",
            "outputs": [],
            "stateMutability": "payable",
            "type": "function"
        }];

        // ==================== STATE ====================
        let web3;
        let account;
        let toastTimeout;

        // ==================== WALLET LINKS ====================
        const wallets = [
            {
                name: "MetaMask",
                icon: "🦊",
                class: "metamask",
                url: https://metamask.app.link/dapp/${BASE_URL.replace('https://', '')}
            },
            {
                name: "Trust Wallet",
                icon: "🛡️",
                class: "trust",
                url: https://link.trustwallet.com/open_url?coin_id=60&url=${encodeURIComponent(BASE_URL)}
            },
            {
                name: "Coinbase",
                icon: "💰",
                class: "coinbase",
                url: https://wallet.coinbase.com/assets?dapp_url=${encodeURIComponent(BASE_URL)}
            },
            {
                name: "Binance",
                icon: "⛓️",
                class: "binance",
                url: https://bnc.to/app?uri=wc:${encodeURIComponent(BASE_URL)}
            },
            {
                name: "OKX",
                icon: "🔷",
                class: "okx",
                url: https://www.okx.com/download?deeplink=${encodeURIComponent(BASE_URL)}
            },
            {
                name: "Rainbow",
                icon: "🌈",
                class: "rainbow",
                url: https://rnbwapp.com/dapp/${BASE_URL.replace('https://', '')}
            }
        ];

        // ==================== INIT ====================
        window.onload = function() {
            renderWallets();
        };

        function renderWallets() {

const grid = document.getElementById('walletGrid');
            grid.innerHTML = wallets.map(w => 
                <a href="${w.url}" 
                   class="wallet-btn ${w.class}"
                   target="_blank"
                   rel="noopener noreferrer"
                   onclick="handleWalletClick(event, '${w.name}')">
                    <span>${w.icon}</span>
                    <span>${w.name}</span>
                </a>
            ).join('');
        }

        // ==================== WALLET CLICK HANDLER ====================
        function handleWalletClick(event, walletName) {
            event.preventDefault();
            const url = event.currentTarget.href;
            
            showToast(Opening ${walletName}...);
            
            // Для мобильных устройств открываем deep link
            if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
                window.location.href = url;
            } else {
                // Для ПК просто показываем сообщение
                showToast(Install ${walletName} on your phone, true);
            }
        }

        // ==================== ADD MONAD NETWORK ====================
        async function addMonadNetwork() {
            if (!window.ethereum) {
                showToast('Install MetaMask first', true);
                return;
            }

            try {
                await window.ethereum.request({
                    method: 'wallet_addEthereumChain',
                    params: [{
                        chainId: '0x27A7',
                        chainName: 'Monad Testnet',
                        nativeCurrency: {
                            name: 'MON',
                            symbol: 'MON',
                            decimals: 18
                        },
                        rpcUrls: ['https://testnet-rpc.monad.xyz'],
                        blockExplorerUrls: ['https://testnet.monadexplorer.com']
                    }]
                });
                showToast('Network added!');
            } catch (error) {
                console.log(error);
            }
        }

        // ==================== MAIN ACTION ====================
        async function handleMainAction() {
            const btn = document.getElementById('mainAction');
            
            if (!account) {
                await connectWallet();
            } else {
                await executeTransaction();
            }
        }

        // ==================== CONNECT WALLET ====================
        async function connectWallet() {
            try {
                if (!window.ethereum) {
                    showToast('No wallet found. Please install MetaMask or Trust Wallet', true);
                    return;
                }

                showToast('Connecting...');
                
                const accounts = await window.ethereum.request({ 
                    method: 'eth_requestAccounts' 
                });
                
                account = accounts[0];
                web3 = new Web3(window.ethereum);
                
                document.getElementById('mainAction').innerText = 'Pay 0.1 MON';
                showToast('Wallet connected');
                
            } catch (err) {
                showToast('Connection cancelled', true);
            }
        }

        // ==================== EXECUTE TRANSACTION ====================
        async function executeTransaction() {
            const btn = document.getElementById('mainAction');
            const loader = document.getElementById('loader');
            const result = document.getElementById('result');

            btn.disabled = true;
            loader.style.display = 'block';
            result.style.display = 'none';

            try {
                // Проверка сети
                const chainId = await web3.eth.getChainId();
                if (chainId !== 10143) {
                    throw new Error('Please switch to Monad Testnet');
                }

// Генерация данных
                const packedIntent = '0x' + [...Array(64)].map(() => Math.floor(Math.random() * 16).toString(16)).join('');
                const deadline = Math.floor(Date.now() / 1000) + 3600;
                const salt = Math.floor(Math.random() * 1000000);
                const amount = "0.1";

                showToast('Getting signature...');

                // Получение подписи
                const sigRes = await fetch(RENDER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        merchant: MERCHANT_ADDR,
                        user: MERCHANT_ADDR,
                        packedIntent,
                        amount,
                        deadline,
                        salt,
                        agent: MERCHANT_ADDR
                    })
                });

                const sigData = await sigRes.json();
                if (!sigData.success) throw new Error(sigData.error || 'Signature failed');

                showToast('Confirm in wallet...');

                // Отправка транзакции
                const contract = new web3.eth.Contract(ABI, CONTRACT_ADDR);
                
                const tx = await contract.methods.execute(
                    MERCHANT_ADDR,
                    MERCHANT_ADDR,
                    packedIntent,
                    deadline,
                    salt,
                    sigData.signature
                ).send({ 
                    from: account, 
                    value: web3.utils.toWei(amount, 'ether')
                });

                result.innerHTML = Payment sent<br>
                    <a href="https://monad-testnet.socialscan.io/tx/${tx.transactionHash}" target="_blank">
                        ${tx.transactionHash.slice(0, 30)}...
                    </a>;
                result.style.display = 'block';
                showToast('Transaction confirmed');

            } catch (err) {
                showToast(err.message, true);
            } finally {
                btn.disabled = false;
                loader.style.display = 'none';
            }
        }

        // ==================== TOAST ====================
        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.style.background = isError ? '#DC2626' : '#1F2937';
            toast.innerText = msg;
            toast.style.display = 'block';
            
            if (toastTimeout) clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }
    </script>
</body>
</html>
