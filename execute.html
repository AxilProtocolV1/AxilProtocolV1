<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axil Protocol | Execute</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
        }
        .card {
            background: white;
            border-radius: 24px;
            padding: 32px;
            max-width: 520px;
            width: 100%;
            box-shadow: 0 25px 50px rgba(0,0,0,0.25);
        }
        .btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            width: 100%;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 24px;
        }
        .btn:hover {
            background: #764ba2;
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .info {
            background: #f8fafc;
            padding: 16px;
            border-radius: 16px;
            margin: 20px 0;
            font-size: 14px;
            border: 1px solid #e2e8f0;
        }
        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
        }
        .label {
            font-weight: 600;
            color: #475569;
        }
        .value {
            color: #0f172a;
            font-family: monospace;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 4px 0 16px 0;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            font-size: 15px;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }
        .badge {
            background: #dbeafe;
            color: #1e40af;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .hash-box {
            background: #f1f5f9;
            padding: 16px;
            border-radius: 12px;
            word-break: break-all;
            margin-top: 20px;
            font-family: monospace;
            font-size: 13px;
            border: 1px solid #e2e8f0;
        }
        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid #e2e8f0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="margin-bottom: 4px;">Axil Protocol</h2>
        <p style="color: #64748b; margin-bottom: 24px;">Execute transaction on Monad</p>
        
        <div class="info">
            <div class="info-item">
                <span class="label">Contract</span>
                <span class="value">0xb3a59e...a4552</span>
            </div>
            <div class="info-item">
                <span class="label">Network</span>
                <span class="value">Monad Testnet <span class="badge">10143</span></span>
            </div>
            <div class="info-item">
                <span class="label">Your address</span>
                <span class="value" id="userAddress">Not connected</span>

</div>
        </div>
        
        <label>Amount (MON)</label>
        <input type="number" id="amount" value="0.1" step="0.001">
        
        <label>Packed intent</label>
        <input type="text" id="packedIntent" value="0x0000000000000000000000000000000100000000000000000000000000000001" readonly>
        
        <label>Deadline (timestamp)</label>
        <input type="number" id="deadline" value="1800000000">
        <small style="color: #64748b;">Current: <span id="currentTime"></span></small>
        
        <label>Salt</label>
        <input type="number" id="salt" value="12345">
        
        <button class="btn" id="executeBtn">Execute transaction</button>
        
        <div id="loading" style="display: none; text-align: center; margin: 20px 0;">
            <div class="spinner"></div>
            <p style="margin-top: 12px; color: #475569;">Processing...</p>
        </div>
        
        <div id="result" style="display: none;" class="hash-box"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js"></script>
    <script>
        const CONTRACT_ADDR = "0xb3a59e559b470ce9edc1ccf70b912f8a021a4552";
        const YOUR_ADDRESS = "0x8cFBB1eEaF94d5877E21D191cA95A520a8710A21";
        const RENDER_URL = "https://axilprotocolv1.onrender.com/sign";
        
        const ABI = [{
            "inputs": [
                {"name": "merchant", "type": "address"},
                {"name": "user", "type": "address"},
                {"name": "packedIntent", "type": "bytes32"},
                {"name": "deadline", "type": "uint256"},
                {"name": "salt", "type": "uint128"},
                {"name": "signature", "type": "bytes"}
            ],
            "name": "execute",
            "outputs": [],
            "stateMutability": "payable",
            "type": "function"
        }];
        
        let web3;
        let account;
        
        window.onload = function() {
            updateTime();
            setInterval(updateTime, 1000);
            if (window.ethereum) web3 = new Web3(window.ethereum);
            document.getElementById('executeBtn').onclick = executeTransaction;
        };
        
        function updateTime() {
            document.getElementById('currentTime').innerText = Math.floor(Date.now() / 1000);
        }
        
        async function executeTransaction() {
            const btn = document.getElementById('executeBtn');
            const loading = document.getElementById('loading');
            const result = document.getElementById('result');
            
            btn.disabled = true;
            loading.style.display = 'block';
            result.style.display = 'none';
            
            try {
                if (!window.ethereum) throw new Error('MetaMask not found');
                
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                account = accounts[0];
                document.getElementById('userAddress').innerText = account.slice(0,6) + '...' + account.slice(-4);
                
                const chainId = await web3.eth.getChainId();
                if (chainId !== 10143) throw new Error('Wrong network');
                
                const amount = document.getElementById('amount').value;
                const packedIntent = document.getElementById('packedIntent').value;
                const deadline = parseInt(document.getElementById('deadline').value);
                const salt = parseInt(document.getElementById('salt').value);
                
                const signatureRes = await fetch(RENDER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({

merchant: YOUR_ADDRESS,
                        user: YOUR_ADDRESS,
                        packedIntent,
                        amount,
                        deadline,
                        salt,
                        agent: YOUR_ADDRESS
                    })
                });
                
                const signatureData = await signatureRes.json();
                if (!signatureData.success) throw new Error(signatureData.error || 'Signature failed');
                
                const contract = new web3.eth.Contract(ABI, CONTRACT_ADDR);
                
                const tx = await contract.methods.execute(
                    YOUR_ADDRESS,
                    YOUR_ADDRESS,
                    packedIntent,
                    deadline,
                    salt,
                    signatureData.signature
                ).send({ from: account, value: web3.utils.toWei(amount, 'ether') });
                
                result.innerHTML = 'Transaction sent<br><a href="https://monad-testnet.socialscan.io/tx/' + tx.transactionHash + '" target="_blank">' + tx.transactionHash + '</a>';
                result.style.display = 'block';
                
            } catch (err) {
                alert('Error: ' + err.message);
            } finally {
                btn.disabled = false;
                loading.style.display = 'none';
            }
        }
    </script>
</body>
</html>
